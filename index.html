<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="version" content="v3.71">
  <title>吃什嘛了</title>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <style>
/* ===== Reset & Base ===== */
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#FFF8F5;color:#3D2C2C;max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden;padding-bottom:70px}
h1{font-size:18px;font-weight:700}

/* ===== Header ===== */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;position:sticky;top:0;background:#FFF8F5;z-index:10}
.header-icon{background:none;border:none;font-size:20px;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .15s;-webkit-tap-highlight-color:transparent}
.header-icon:active{background:rgba(0,0,0,0.05)}
.header-spacer{width:40px;flex-shrink:0}
.header h1{font-family:'ZCOOL KuaiLe',cursive;font-size:18px;color:#3D2C2C}

/* ===== Footer Nav ===== */
#footer{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:90%;max-width:420px;display:flex;background:#fff;border-top:1px solid #f0e8e3;border-radius:20px 20px 0 0;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 12px rgba(0,0,0,0.06)}
#footer button{flex:1;padding:4px 4px 10px;background:none;border:none;font-size:11px;color:#bbb;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;-webkit-tap-highlight-color:transparent;transition:color .15s}
#footer button .fi{display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;line-height:1}
#footer button.on{color:#E8734A;font-weight:600}

/* ===== Views ===== */
.view{display:none;min-height:100vh}
.view.on{display:block;min-height:100vh}

/* ===== Overview Card ===== */
.overview-section{padding:0 16px 80px;min-height:calc(100vh - 70px);box-sizing:border-box}
.overview-card{background:#fff;border-radius:16px;padding:18px 20px;margin-bottom:12px;text-align:center;box-shadow:2px 2px 8px rgba(0,0,0,0.06);height:320px!important;display:flex;flex-direction:column;justify-content:flex-start;gap:1px;overflow:hidden}
.date-big{font-family:'ZCOOL KuaiLe',cursive;font-size:22px;color:#3D2C2C;display:inline-flex;align-items:center;gap:12px;justify-content:center;width:100%}
.date-arrow{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:#FFF5F0;color:#E8734A;font-size:24px;font-weight:700;cursor:pointer;user-select:none;-webkit-user-select:none;transition:all .15s}
.date-arrow:active{background:#E8734A;color:#fff}
.cal-inline{font-family:'ZCOOL KuaiLe',cursive;font-size:44px;color:#E8734A;line-height:1.1;height:48px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px}
.cal-unit{font-size:18px;color:#999;font-weight:400;margin-left:4px}
.cal-target{font-family:'ZCOOL KuaiLe',cursive;font-size:14px;color:#999}
.cal-label{font-size:13px;color:#bbb}

/* ===== Progress Bar ===== */
.progress-wrap{position:relative;height:24px!important;border:2px solid #3D2C2C;border-radius:12px;background:#fff;overflow:hidden}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#E8734A,#F4A261);transition:width .5s ease}
.progress-fill.over{background:linear-gradient(90deg,#EF5350,#FF7043)}
.progress-fill::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 10px,rgba(255,255,255,0.12) 10px,rgba(255,255,255,0.12) 12px);border-radius:10px}
.progress-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'ZCOOL KuaiLe',cursive;font-size:13px;color:#3D2C2C;z-index:2;text-shadow:1px 1px 0 #fff}
.msg{font-family:'ZCOOL KuaiLe',cursive;font-size:14px;min-height:22px;transition:all .3s;margin-bottom:4px}

/* ===== Meal Cards ===== */
.meal-card{background:#fff;border-radius:16px;padding:14px 16px;margin:0 16px 10px;box-shadow:2px 2px 8px rgba(0,0,0,0.06)}
.meal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.meal-title{font-family:'ZCOOL KuaiLe',cursive;font-size:16px;color:#E8734A;display:flex;align-items:center;gap:6px}
.meal-cal{font-family:'ZCOOL KuaiLe',cursive;font-size:14px;color:#999}
.meal-actions{display:flex;gap:8px}
.meal-actions button{background:none;border:none;font-size:16px;cursor:pointer;padding:2px 6px;border-radius:6px;-webkit-tap-highlight-color:transparent}
.meal-actions button:active{background:#f5f5f5}
.meal-edit-btn{color:#999}
.meal-del-btn{color:#E57373}
.food-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f8f4f0}
.food-row:last-child{border-bottom:none}
.food-info{flex:1}
.food-name{font-size:14px;color:#3D2C2C}
.food-meta{font-size:12px;color:#bbb}
.food-cal{font-family:'ZCOOL KuaiLe',cursive;font-size:15px;color:#E8734A;margin-right:24px;text-align:left;min-width:50px}
.food-del{background:none;border:none;font-size:18px;color:#ccc;cursor:pointer;padding:0 4px;-webkit-tap-highlight-color:transparent}
.food-del:active{color:#E57373}
.food-row.editing{padding:0;position:relative;min-height:40px}
.food-row.editing .food-text{display:block;flex:1;min-width:0;overflow:visible;white-space:normal}.food-row.editing .food-cal,.food-row.editing .food-acts{display:none}
.food-msg{font-family:ZCOOL KuaiLe,cursive;font-size:14px;text-align:center;margin-top:8px;min-height:22px;color:#999;margin-top:auto}
.f-edit-input{flex:2;min-width:100px;padding:6px 8px;border:1.5px solid #E8734A;border-radius:8px;font-size:13px;outline:none;font-family:inherit}
.f-edit-g{flex:1;min-width:50px;max-width:70px;padding:6px;border:1.5px solid #E8734A;border-radius:8px;font-size:13px;text-align:center;outline:none}
.f-edit-ok{background:#E8734A;color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.f-edit-no{background:none;border:1px solid #ddd;border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;color:#999}
.inline-add-form{margin-top:8px;padding:10px;background:#FFF5F0;border-radius:10px;border:1.5px dashed #E8734A}
.meal-empty{text-align:center;color:#ddd;font-size:13px;padding:12px 0}

/* ===== FAB ===== */
#addBtn{position:fixed;bottom:100px;right:20px;width:56px;height:56px;border-radius:50%;background:#E8734A;color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(232,115,74,0.4);z-index:50;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:transform .15s}
#addBtn:active{transform:scale(0.92)}
#addBtn.hidden{display:none}

/* ===== Water Overview Card ===== */
.water-overview-card{background:#fff;border-radius:16px;padding:18px 20px;margin-bottom:12px;text-align:center;box-shadow:2px 2px 8px rgba(0,0,0,0.06);height:320px;display:flex;flex-direction:column;justify-content:flex-start;gap:1px;overflow:hidden}
.icon-container{display:flex;justify-content:center;margin:4px 0 6px;height:105px;align-items:center;flex-shrink:0}
.icon-svg{width:100px;height:105px;animation:iconFloat 3s ease-in-out infinite}
.water-total{margin:0;height:48px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px}
.water-num{font-family:'ZCOOL KuaiLe',cursive;font-size:44px;color:#1976D2;font-weight:700;line-height:1.1}
.water-unit{font-size:16px;color:#64B5F6;margin-left:4px}
.water-target-line{font-family:'ZCOOL KuaiLe',cursive;font-size:14px;color:#999}
.water-progress-bg{position:relative;height:24px;border:2px solid #3D2C2C;border-radius:12px;background:#fff;overflow:hidden}
.water-progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#4FC3F7,#1976D2);transition:width .5s ease;position:relative}
.water-progress-fill::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 10px,rgba(255,255,255,0.12) 10px,rgba(255,255,255,0.12) 12px);border-radius:10px}
.water-progress-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:ZCOOL KuaiLe,cursive;font-size:13px;color:#3D2C2C;z-index:2;text-shadow:1px 1px 0 #fff}
.water-msg{font-family:'ZCOOL KuaiLe',cursive;font-size:14px;text-align:center;margin-top:8px;min-height:22px;color:#999;margin-top:auto}
.water-msg.reminder{color:#E57373}
.water-msg.encourage{color:#66BB6A}
.water-msg.great{color:#1976D2}

/* ===== Water Preset Buttons (card style) ===== */
.water-presets-row{display:flex;gap:10px;margin:0 16px 10px}
.water-preset-card{flex:1;padding:16px 8px;border:none;border-radius:16px;background:#fff;color:#1565C0;font-family:'ZCOOL KuaiLe',cursive;font-size:13px;cursor:pointer;box-shadow:2px 2px 8px rgba(0,0,0,0.06);border:2px solid #E3F2FD;-webkit-tap-highlight-color:transparent;transition:all .15s;text-align:center}
.water-preset-card:active{background:#E3F2FD;transform:scale(0.97)}
.water-preset-label{font-size:15px;font-weight:700;color:#1976D2}
.wp-emoji{font-size:20px}

/* ===== Water Custom Input ===== */
.water-custom-row{display:flex;gap:8px;padding:0 16px;margin-bottom:12px}
.water-custom-row input{flex:1;padding:12px;border:2px solid #E3F2FD;border-radius:12px;font-size:15px;text-align:center;background:#FAFCFF;color:#1565C0;outline:none;font-family:'ZCOOL KuaiLe',cursive}
.water-custom-row input:focus{border-color:#64B5F6}
.water-custom-btn{padding:12px 18px;border:none;border-radius:12px;background:#1976D2;color:#fff;font-family:'ZCOOL KuaiLe',cursive;font-size:15px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.water-custom-btn:active{background:#1565C0}

/* ===== Water History Card ===== */
.water-history-card{background:#fff;border-radius:16px;padding:14px 16px;margin:0 16px 12px;box-shadow:2px 2px 8px rgba(0,0,0,0.06)}
.water-history-title{font-family:'ZCOOL KuaiLe',cursive;font-size:15px;color:#90A4AE;margin-bottom:8px}
.water-entry{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f8f4f0}
.water-entry:last-child{border-bottom:none}
.water-entry-left{display:flex;align-items:center;gap:8px;font-size:14px;color:#3D2C2C}
.water-entry-amount{font-family:'ZCOOL KuaiLe',cursive;font-size:16px;color:#1976D2;font-weight:700}
.water-entry-del{background:none;border:none;font-size:18px;color:#B0BEC5;cursor:pointer;padding:4px 8px;-webkit-tap-highlight-color:transparent}
.water-entry-del:active{color:#E57373}
.water-empty{text-align:center;color:#CFD8DC;font-size:13px;padding:20px 0}

/* ===== Settings ===== */
.settings-wrap{padding:16px;padding-bottom:100px}
.s-card{background:#fff;border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:2px 2px 8px rgba(0,0,0,0.06)}
.s-card h3{font-family:'ZCOOL KuaiLe',cursive;font-size:16px;margin-bottom:12px;color:#3D2C2C}
.s-input{width:100%;padding:10px 14px;border:2px solid #f0e8e3;border-radius:12px;font-size:15px;outline:none;font-family:inherit;transition:border-color .15s}
.s-input:focus{border-color:#E8734A}
.goal-row{display:flex;gap:8px}
.goal-item{flex:1;padding:10px;border:2px solid #f0e8e3;border-radius:10px;text-align:center;font-size:14px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;font-family:'ZCOOL KuaiLe',cursive}
.goal-item.on{border-color:#E8734A;background:#FFF5F0;color:#E8734A}
#goalMsg{text-align:center;padding:10px 16px;font-size:13px;color:#999;font-style:italic;min-height:20px}
.btn-save{width:100%;padding:14px;background:#E8734A;color:#fff;border:none;border-radius:12px;font-size:16px;font-family:'ZCOOL KuaiLe',cursive;cursor:pointer;margin-top:12px;-webkit-tap-highlight-color:transparent}
.btn-save:active{background:#d4623a}


/* ===== Meal Cards (stickyHTML) ===== */
.meal-sticky{position:relative;background:#fff;border-radius:16px;padding:14px 16px 14px 44px;margin:0 16px 10px;box-shadow:2px 2px 8px rgba(0,0,0,0.06)}
.meal-del{position:absolute;top:8px;left:8px;width:28px;height:28px;border-radius:50%;background:none;border:none;font-size:16px;cursor:pointer;color:#ccc;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.meal-del:active{background:#ffebee;color:#E57373}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.mt{font-family:'ZCOOL KuaiLe',cursive;font-size:15px;color:#E8734A}
.mt2{font-size:11px;color:#ccc}
.photo-strip{display:flex;gap:6px;margin:6px 0;overflow-x:auto;padding-bottom:4px}
.photo-strip img{width:80px;height:80px;object-fit:cover;border-radius:10px;cursor:pointer;flex-shrink:0}
.food-list{margin:6px 0}
.food-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f8f4f0}
.food-row:last-child{border-bottom:none}
.food-text{flex:1;font-size:14px;color:#3D2C2C;cursor:pointer}
.food-text:active{color:#E8734A}
.food-cal{font-family:'ZCOOL KuaiLe',cursive;font-size:14px;color:#E8734A;margin-right:6px;text-align:left;min-width:50px}
.food-acts{display:flex;gap:1px}
.food-btn{background:none;border:none;font-size:14px;cursor:pointer;padding:2px 4px;border-radius:4px;-webkit-tap-highlight-color:transparent;opacity:0.4;transition:opacity .15s}
.food-row:hover .food-btn{opacity:1}
.food-btn:active{background:#f5f5f5}
.food-btn-del{color:#E57373}
.meal-sub{font-family:'ZCOOL KuaiLe',cursive;font-size:13px;color:#bbb;margin-top:6px;padding-top:6px;border-top:1px solid #f8f4f0}
.meal-actions{margin-top:8px}
.btn-add-food{width:100%;padding:8px;background:#FFF5F0;border:1.5px dashed #E8734A;border-radius:10px;color:#E8734A;font-size:13px;font-family:'ZCOOL KuaiLe',cursive;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-add-food:active{background:#ffe8df}/* ===== Meal Section Grid ===== */
.meal-section{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
@media(max-width:400px){.meal-section{grid-template-columns:1fr}}

/* Sticky note colors per meal type */
.meal-sticky[data-meal-type="breakfast"]{border-left:4px solid #FFB74D}
.meal-sticky[data-meal-type="lunch"]{border-left:4px solid #66BB6A}
.meal-sticky[data-meal-type="dinner"]{border-left:4px solid #5C6BC0}
.meal-sticky[data-meal-type="snack"]{border-left:4px solid #EC407A}

/* Add food button in sticky */
.btn-add-food{margin-top:8px}

/* ===== Empty state ===== */
.empty-state{text-align:center;padding:40px 20px;color:#ddd}
.empty-state .ico{font-size:48px;margin-bottom:12px}
.empty-state .tx{font-family:'ZCOOL KuaiLe',cursive;font-size:15px;line-height:1.6}

/* ===== Meal preview chips ===== */
.meal-preview{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.meal-chip{flex-shrink:0;background:#fff;border-radius:12px;padding:10px 14px;box-shadow:2px 2px 6px rgba(0,0,0,0.06);min-width:90px;text-align:center}
.meal-chip .ico{font-size:20px}
.meal-chip .nm{font-family:'ZCOOL KuaiLe',cursive;font-size:12px;color:#999;margin-top:2px}
.meal-chip .vl{font-family:'ZCOOL KuaiLe',cursive;font-size:14px;color:#E8734A;margin-top:2px}

/* ===== Scribble divider ===== */
.scribble{text-align:center;color:#e8e0db;font-size:16px;letter-spacing:4px;margin:12px 0;font-family:ZCOOL KuaiLe,cursive}
.meal-grid{margin-top:10px;text-align:center}
.meal-box{background:#fff;border-radius:14px;padding:14px;box-shadow:2px 2px 8px rgba(0,0,0,0.06);text-align:center;display:inline-block;width:48%;margin:1%;vertical-align:top;box-sizing:border-box}
.meal-box .mb-name{font-family:ZCOOL KuaiLe,cursive;font-size:13px;color:#3D2C2C;margin-top:2px}
.meal-box .mb-cal{font-family:ZCOOL KuaiLe,cursive;font-size:16px;color:#E8734A;margin-top:2px}
.meal-box .mb-ico{font-size:22px}

/* ===== Inline add form in meal ===== */
.inline-add-form{margin-top:8px;padding:10px;background:#FFF5F0;border-radius:10px;border:1.5px dashed #E8734A}
.inline-add-form input{width:100%;padding:8px 10px;border:1.5px solid #E8734A;border-radius:8px;font-size:13px;outline:none;margin-bottom:6px;font-family:inherit}
.f-input{width:100%;padding:8px 10px;border:1.5px solid #E8734A;border-radius:8px;font-size:13px;outline:none;font-family:inherit}

/* ===== Header icon fix for calendar emoji ===== */
.header-icon{font-size:20px;line-height:1}

/* ===== Water history section ===== */
.water-section{margin:0 16px 8px}


/* ===== Rice Bowl Animation (Food View) ===== */
.icon-container{display:flex;justify-content:center;margin:4px 0 6px;height:105px;align-items:center;flex-shrink:0}
.icon-svg{width:100px;max-height:105px}
.rice-surface-wave{animation:riceWave 3s ease-in-out infinite}
.water-surface-wave{animation:waterWave 2s ease-in-out infinite}
@keyframes riceWave{0%,100%{transform:scaleX(1) translateY(0)}50%{transform:scaleX(1.04) translateY(-1px)}}
@keyframes bowlBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes cupSway{0%,100%{transform:rotate(0deg)}25%{transform:rotate(0.5deg)}75%{transform:rotate(-0.5deg)}}
@keyframes waterWave{0%,100%{transform:scaleX(1) translateY(0)}25%{transform:scaleX(1.03) translateY(0.5px)}75%{transform:scaleX(0.97) translateY(-0.5px)}}
@keyframes wobble{0%,100%{transform:scale(1) rotate(0deg)}25%{transform:scale(1.015) rotate(0.3deg)}75%{transform:scale(0.985) rotate(-0.3deg)}}
.wobble-circle{animation:wobble 4s ease-in-out infinite;transform-origin:50px 50px}

/* ===== Module 1: Summary Grid ===== */
.meal-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.summary-box{background:#fff;border-radius:14px;padding:14px;box-shadow:2px 2px 8px rgba(0,0,0,0.06);text-align:center}
.summary-box .sb-ico{font-size:20px}
.summary-box .sb-name{font-family:'ZCOOL KuaiLe',cursive;font-size:13px;color:#3D2C2C;margin-top:2px}
.summary-box .sb-cal{font-family:'ZCOOL KuaiLe',cursive;font-size:16px;color:#E8734A;margin-top:2px}

/* ===== Module 2: Meal List ===== */
.meal-list{margin-top:4px}
/* ===== Calendar Drawer ===== */
.cal-drawer{position:fixed;inset:0;z-index:9000;display:none;background:rgba(0,0,0,0.5);align-items:flex-end;justify-content:center}
.cal-drawer.on{display:flex}
.cal-drawer-inner{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column;animation:slideUp .25s ease;padding:16px 12px}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.cal-drawer-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid #f0e8e3}
.cal-drawer-header button{background:none;border:none;font-size:18px;cursor:pointer;padding:4px 8px;border-radius:8px;-webkit-tap-highlight-color:transparent}
.cal-drawer-header button:active{background:#f5f5f5}
.cal-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 16px}
.cal-nav button{background:none;border:none;font-size:20px;cursor:pointer;color:#3D2C2C;padding:4px 12px;border-radius:8px;-webkit-tap-highlight-color:transparent;font-family:'ZCOOL KuaiLe',cursive}
.cal-nav button:active{background:#f5f5f5}
#monLabel{font-family:'ZCOOL KuaiLe',cursive;font-size:16px;min-width:100px;text-align:center}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);padding:8px 12px 4px;text-align:center;font-size:12px;color:#bbb}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:8px 12px 24px;gap:8px 4px}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;position:relative;margin:1px;transition:all .2s;background:#fff;font-size:14px;font-family:'ZCOOL KuaiLe',cursive}
.cal-cell.empty{cursor:default;background:transparent}
.cal-cell .dn{font-size:14px;z-index:1;position:relative}
.cal-cell.today{box-shadow:0 0 0 2px #E8734A}
.cal-cell.future{color:#ccc;cursor:default;pointer-events:none;background:#f5f5f5!important}
.cal-ring-wrap{position:absolute;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none;z-index:2}

// Cache for online calorie lookups
var onlineCalCache = {};

/* ===== Data ===== */
function lookupCalorieOnline(name, grams) {
  return new Promise(function(resolve) {
    if (onlineCalCache[name]) { resolve(onlineCalCache[name]); return; }
    var url = 'https://world.openfoodfacts.org/api/v2/search?q=' +
      encodeURIComponent(name) + '&page_size=5';
    fetch(url, {headers: {'Accept': 'application/json'}})
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var calPer100 = null;
        if (data.products && data.products.length > 0) {
          for (var i = 0; i < data.products.length; i++) {
            var p = data.products[i];
            var n = p.nutriments || {};
            var energy = n['energy-kcal_100g'] || n['energy-kcal/100g'] || n['energy-kcal'];
            if (energy && energy > 0) { calPer100 = Math.round(energy); break; }
          }
        }
        if (calPer100) { onlineCalCache[name] = calPer100; resolve(calPer100); }
        else resolve(null);
      })
      .catch(function() { resolve(null); });
  });
}

function calcRowCal(name, grams) {
  name = (name || '').toLowerCase();
  var found = null;
  // Tier 1: Built-in database
  for (var k in CAL_DB) {
    if (name.indexOf(k) >= 0 || k.indexOf(name) >= 0) { found = CAL_DB[k]; break; }
  }
  if (found) {
    var keys = Object.keys(found).map(Number).sort(function(a,b){return a-b});
    var best = keys[0], bestD = Infinity;
    keys.forEach(function(g) { if (Math.abs(g - grams) < bestD) { bestD = Math.abs(g - grams); best = g; } });
    var cal = found[best];
    if (best !== grams && grams > 0) cal = Math.round(cal * grams / best);
    return cal;
  }
  // Tier 2: Online cache
  if (onlineCalCache[name]) { return Math.round(onlineCalCache[name] * grams / 100); }
  // Tier 3: Default
  return Math.round(grams * 1.5);
}

/* ===== IndexedDB Storage ===== */
var DB_NAME = 'DietTracker';
var DB_VERSION = 1;
var STORE_NAME = 'records';
var _db = null;

function openDB() {
  return new Promise(function(resolve, reject) {
    if (_db) return resolve(_db);
    var req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
    };
    req.onsuccess = function(e) { _db = e.target.result; resolve(_db); };
    req.onerror = function(e) { reject(e.target.error); };
  });
}

function saveData() {
  var records = D.records || {};
  var settings = D.settings || {};
  // Save settings to localStorage
  try {
    localStorage.setItem('dietSettings', JSON.stringify(settings));
  } catch(e) {
    toast('⚠️ 设置保存失败', 'err');
  }
  // Save records to IndexedDB
  openDB().then(function(db) {
    var tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(records, 'records');
    return new Promise(function(r) { tx.oncomplete = r; });
  }).catch(function(e) {
    console.error('IDB save failed:', e);
    toast('💾 数据保存失败，请重试', 'err');
  });
}

async function loadData() {
  // Load settings from localStorage
  try {
    var sv = localStorage.getItem('dietSettings');
    if (sv) D.settings = JSON.parse(sv);
    else D.settings = {dailyCalorieTarget:1800,goalType:'cutting',dailyWaterTarget:2000};
  } catch(e) {
    D.settings = {dailyCalorieTarget:1800,goalType:'cutting',dailyWaterTarget:2000};
  }
  if (!D.settings.targetHistory) D.settings.targetHistory = {};
  if (!D.settings._defaultTarget) D.settings._defaultTarget = D.settings.dailyCalorieTarget;
  if (!D.settings.dailyWaterTarget) D.settings.dailyWaterTarget = 2000;

  // Load records from IndexedDB
  try {
    var db = await openDB();
    var tx = db.transaction(STORE_NAME, 'readonly');
    var req = tx.objectStore(STORE_NAME).get('records');
    D.records = await new Promise(function(resolve) {
      req.onsuccess = function() { resolve(req.result || {}); };
      req.onerror = function() { resolve({}); };
    });

    D.records = {};
  }
    document.getElementById('inpTarget').value = D.settings.dailyCalorieTarget || 1800;

renderToday();

function updGoalUI() {
  var gt = _pendingGoal || D.settings.goalType || 'cutting';
  document.querySelectorAll('#goalRow .goal-item').forEach(function(c) {
    c.classList.toggle('on', c.dataset.t === gt);
  });

    msg.textContent = msgs[gt] || "";
  }
}

function pickGender(el) {
  var g = el.dataset.g;
  if (!g) return;
  _pendingGender = g;
  document.querySelectorAll('.gender-opt').forEach(function(c) {
    c.classList.toggle('on', c.dataset.g === g);

  calcRecommend();
}

function calcRecommend() {
  var gender = _pendingGender || (D.settings && D.settings.gender) || 'male';
  var h = parseFloat(document.getElementById('inpHeight').value) || 0;
  var w = parseFloat(document.getElementById('inpWeight').value) || 0;
  var tw = parseFloat(document.getElementById('inpTargetWeight').value) || 0;
  var recEl = document.getElementById('recResult');
  var calEl = document.getElementById('recCal');
  var waterEl = document.getElementById('recWater');

  if (!h || !w) { if (recEl) recEl.style.display = 'none'; return; }

  // Mifflin-St Jeor BMR
  var bmr = 10 * w + 6.25 * h - 5 * 30 + (gender === 'female' ? -161 : 5); // age=30 as default
  var activityFactor = 1.55; // moderate activity

  var gt = _pendingGoal || (D.settings && D.settings.goalType) || 'cutting';
  var tdee = bmr * activityFactor;
  var targetCal;

  if (gt === 'cutting') targetCal = Math.round(tdee - 500);
  else if (gt === 'bulking') targetCal = Math.round(tdee + 300);
  else targetCal = Math.round(tdee);

  // Clamp to safe range
  targetCal = Math.max(1200, Math.min(targetCal, 4000));

  var water = Math.round(w * 35); // 35ml per kg

  if (recEl) { recEl.style.display = 'block'; }
  if (calEl) calEl.textContent = targetCal;
  if (waterEl) waterEl.textContent = water;
  // Auto-fill target inputs
  var ctInp = document.getElementById('inpTarget');
  var wtInp = document.getElementById('inpWaterTarget');
  if (ctInp) ctInp.value = targetCal;
  if (wtInp) wtInp.value = water;
}
function pickGoal(el) {
  var t = el.dataset.t;
  if (!t) return;
  _pendingGoal = t;

  var wtInp = document.getElementById('inpWaterTarget');
  if (ctInp) ctInp.value = el.dataset.c || 1800;
  if (wtInp) wtInp.value = el.dataset.w || 2000;
  calcRecommend();
}

var calY, calM;
function renderCal() {
  if (!calY) { var t = today.split('-'); calY = +t[0]; calM = +t[1]; }
  document.getElementById('monLabel').textContent = calY + '年 ' + calM + '月';
  var first = new Date(calY, calM - 1, 1).getDay();
  var days = new Date(calY, calM, 0).getDate();
  var h = '';
  var nowStr = fmtDate(new Date());
  for (var i = 0; i < first; i++) h += '<div class="cal-cell empty"></div>';
  for (var d = 1; d <= days; d++) {
    var ds = calY + '-' + pad(calM) + '-' + pad(d);
    var day = D.records[ds];
    var cls = 'cal-cell';
    if (calMode === 'water') {
      var wt = getWaterTotal(ds);
      if (wt > 0) {
        cls += ' has-rec';
        if (wt >= waterTarget) cls += ' over-rec';
        else if (wt >= waterTarget * 0.8) cls += ' near-rec';
      }
    } else {
      var tgt2 = getTargetForDate(ds);
      if (day && day.meals && day.meals.length) {
        cls += ' has-rec';
        var calSum2 = 0;
        day.meals.forEach(function(food, fi) { calSum2 += (food.totalCalories || 0); });
        if (calSum2 > tgt2) cls += ' over-rec';
        else if (calSum2 > tgt2 * 0.8) cls += ' near-rec';
      }
    }
    if (ds === today) cls += ' today';
    if (ds > nowStr) cls += ' future';
    var click = (ds > nowStr) ? '' : ' onclick="openDay(\'' + ds + '\')"';
    
    // Calculate progress for rings
    var calPct = 0, waterPct = 0;
    if (day) {
      var tgt2 = getTargetForDate(ds);
      var calFromMeals = 0;
      if (day.meals) day.meals.forEach(function(food, fi) { calFromMeals += (food.totalCalories || 0); });
      if (calFromMeals && tgt2) calPct = calFromMeals / tgt2 * 100;
      var wt2 = getWaterTotal(ds);
      if (wt2 && waterTarget) waterPct = wt2 / waterTarget * 100;
    }
    var hasData = calPct > 0 || waterPct > 0;
    if (hasData && !(cls.indexOf("future") >= 0)) cls += " has-rec";
    else if (!(cls.indexOf("future") >= 0)) cls += " has-rec"; // faint ring needs has-rec too
    
    h += '<div class="' + cls + '"' + click + '>';
    if (hasData) {
      h += '<div class="cal-ring-wrap">' + ringSVG(calPct, waterPct) + '</div>';
    } else if (!(cls.indexOf("future") >= 0)) {
      h += '<div class="cal-ring-wrap faint-ring">' + ringSVG(0, 0) + '</div>';
    }
    h += '<span class="dn">' + d + '</span>';
    h += '</div>';
  }
  document.getElementById('calGrid').innerHTML = h;
}

function chgMonth(d) {
  calM += d;

  if (calM < 1) { calM = 12; calY--; }

}

  var rows = document.querySelectorAll('#foodRows .food-add-row');

  rows.forEach(function(row) {

    var gramsEl = row.querySelector('.fr-grams');

    var inDb = false;
    for (var k in CAL_DB) {
      if (name.indexOf(k) >= 0 || k.indexOf(name) >= 0) { inDb = true; break; }
    }
    if (inDb || onlineCalCache[name]) return;
    lookupNames.push({name: name, grams: grams, calEl: calEl});
  });
  if (!lookupNames.length) return;
  lookupNames.forEach(function(item) {
    lookupCalorieOnline(item.name, item.grams).then(function(calPer100) {
      if (calPer100 && item.calEl && item.calEl.parentElement) {

function compressPhoto(file, maxDim, quality) {
  maxDim = maxDim || 200;
  quality = quality || 0.5;
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var scale = Math.min(maxDim / img.width, maxDim / img.height, 1);
      var w = Math.round(img.width * scale);
      var h = Math.round(img.height * scale);
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = URL.createObjectURL(file);
  });
}

async function recognizeFood(file) {
  var aiResult = document.getElementById("aiResult");
  var aiResultText = document.getElementById("aiResultText");
  var aiLoading = document.getElementById("aiLoading");
  var apiKey = STEPFUN_API_KEY;
  
  aiResult.style.display = 'block';
  aiResultText.textContent = '';
  aiLoading.style.display = 'inline';
  
  if (!apiKey) {
    aiLoading.style.display = 'none';
    aiResultText.textContent = '请先在设置中配置 AI API Key';
    return;
  }
  
  try {
    // Compress image to reduce upload size
    var base64 = await new Promise(function(resolve) {
      var img = new Image();
      img.onload = function() {
        var maxDim = 200;
        var scale = Math.min(maxDim / img.width, maxDim / img.height, 1);
        var w = Math.round(img.width * scale);
        var h = Math.round(img.height * scale);
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.5).split(',')[1]);
      };
      img.src = URL.createObjectURL(file);
    });
    
    aiLoading.textContent = '🔍 AI 识别中...';
    
    var res = await fetch('https://api.stepfun.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + STEPFUN_API_KEY
      },
      body: JSON.stringify({
        model: 'step-1o-turbo-vision',
        messages: [{
          role: 'user',
          content: [
            { type: 'text', text: '识别这张照片中的食物，以JSON数组格式返回，每个元素包含name(食物名称)、grams(估算克数)和calPer100g(每100克卡路里)。只返回JSON，不要其他文字。示例：[{"name":"米饭","grams":150,"calPer100g":116},{"name":"青菜","grams":100,"calPer100g":25}]' },
            { type: 'image_url', image_url: { url: 'data:image/jpeg;base64,' + base64 } }
          ]
        }]
      })
    });
    
    var data = await res.json();
    aiLoading.style.display = 'none';
    
    if (data.choices && data.choices[0]) {
      var text = data.choices[0].message.content;
      var jsonMatch = text.match(/\[.*\]/s);
      if (jsonMatch) {
        var foods = JSON.parse(jsonMatch[0]);
        if (foods.length) {
          aiResultText.textContent = '识别出 ' + foods.length + ' 种食物（叠加到现有食物）';
          // Keep only non-empty rows, remove empty ones
          var container = document.getElementById('foodRows');
          var keepRows = [];
          document.querySelectorAll('#foodRows .food-add-row').forEach(function(r) {
            var nameEl = r.querySelector('.fr-name');
            if (nameEl && nameEl.value.trim()) keepRows.push(r.outerHTML);
          });
          container.innerHTML = keepRows.join('');
          foodRowCount = keepRows.length;
          foods.forEach(function(food) {
            addFoodRow();
            var row = document.getElementById('foodRow_' + foodRowCount);
            if (row) {
              var nameEl = row.querySelector('.fr-name');
              var gramsEl = row.querySelector('.fr-grams');
              var calEl = row.querySelector('.fr-cal');
              if (nameEl) nameEl.value = food.name || '';
              if (gramsEl) gramsEl.value = food.grams || 100;
              if (calEl && food.calPer100g && food.grams) {
                calEl.textContent = Math.round(food.calPer100g * food.grams / 100) + '卡';
              }
            }
          });
          // Update total from AI-provided calories
          var totalFromAI = 0;
          document.querySelectorAll('#foodRows .food-add-row').forEach(function(r) {
            var ce = r.querySelector('.fr-cal');
            if (ce) totalFromAI += (parseInt(ce.textContent) || 0);
          });
          var calDisplay = document.getElementById('calDisplay');
          if (calDisplay) calDisplay.textContent = totalFromAI + ' 卡';
        } else {
          aiResultText.textContent = '未识别出食物，请手动输入';
        }
      } else {
        aiResultText.textContent = '未识别出食物，请手动输入';
      }
    } else {
      aiResultText.textContent = '识别失败：' + (data.error ? data.error.message : '未知错误');
    }
  } catch(e) {
    aiLoading.style.display = 'none';
    aiResultText.textContent = '识别失败：' + (e.message || '网络错误');
  }
}

  var textEl = row.querySelector('.food-text');
  if (textEl) {
    textEl.innerHTML = '<input class="f-edit-inline" id="efn_' + mealId + '_' + foodIdx + '" value="' + (f.name||'').replace(/'/g, "\'") + '" style="width:120px;padding:3px 6px;border:1.5px solid #E8734A;border-radius:6px;font-size:13px;outline:none;font-family:inherit">' +
      '<input class="f-edit-inline" id="efg_' + mealId + '_' + foodIdx + '" type="number" value="' + (f.grams||100) + '" style="width:55px;padding:3px;border:1.5px solid #E8734A;border-radius:6px;font-size:13px;text-align:center;outline:none;font-family:inherit">' +
      '<button class="f-edit-ok" onclick="saveFoodEdit(document.getElementById(\'fr_' + mealId + '_' + foodIdx + '\'))" style="background:#E8734A;color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:12px;cursor:pointer">✓</button>' +
      '<button class="f-edit-no" onclick="cancelFoodEdit(\'fr_' + mealId + '_' + foodIdx + '\')" style="background:none;border:1px solid #ddd;border-radius:6px;padding:3px 8px;font-size:12px;cursor:pointer;color:#999">✕</button>';
  }
  var nameEl = document.getElementById('efn_' + mealId + '_' + foodIdx);
  if (nameEl) { nameEl.focus(); nameEl.select(); }
}

async function saveFoodEdit(row) {
  if (!row) return;
  row.classList.remove('editing');
  
  var nameEl = row.querySelector('[id^=efn_]');
  var gramsEl = row.querySelector('[id^=efg_]');
  if (!nameEl || !gramsEl) return;
  
  var name = nameEl.value.trim();
  var grams = parseInt(gramsEl.value) || 100;
  if (!name) { cancelFoodEdit(row.id); return; }
  
  // Parse mealId and foodIdx from row id
  var parts = row.id.split('_');
  var mealId = parts[1];
  var foodIdx = parseInt(parts[2]);
  
  // Get day and meal data
  var day = D.records[today];
  if (!day || !day.meals) return;
  var meal = day.meals.find(m => m.id === mealId);
  if (!meal || !meal.foods || !meal.foods[foodIdx]) return;
  
  // Update food item
  meal.foods[foodIdx].name = name;
  meal.foods[foodIdx].grams = grams;
  
  // Recalc calories
  var cal = 0;
  var found = null;
  for (var k in CAL_DB) {
    if (name === k || name.indexOf(k) >= 0 || k.indexOf(name) >= 0) { found = CAL_DB[k]; break; }
  }
  if (found) {
    var keys = Object.keys(found).map(Number).sort(function(a,b){return a-b});
    var best = keys[0], bestD = Infinity;
    keys.forEach(function(g) { if (Math.abs(g - grams) < bestD) { bestD = Math.abs(g - grams); best = g; } });
    cal = found[best];
    if (best !== grams && grams > 0) cal = Math.round(cal * grams / best);
  } else {
    cal = Math.round(grams * 1.5);
  }
  meal.foods[foodIdx].calories = cal;
  
  saveData();
  
  meal.totalCalories = meal.foods.reduce(function(s, f) { return s + (f.calories || 0); }, 0);
  saveData();
  
  toast('✅ 已更新', 'ok');
  await loadData();
}

function cancelFoodEdit(rowId) {
  var row = document.getElementById(rowId);
  if (!row) return;
  row.classList.remove('editing');
  // Reload to restore original text
  loadData();
}

// Delete a single food item from a meal
async function delFood(mealId, foodIdx) {
  if (!confirm('删掉这一项？')) return;
  var day = D.records[today];
  if (!day || !day.meals) return;
  var meal = day.meals.find(m => m.id === mealId);
  if (!meal || !meal.foods) return;
  
  meal.foods.splice(foodIdx, 1);
  meal.totalCalories = meal.foods.reduce(function(s, f) { return s + (f.calories || 0); }, 0);
  
  saveData();
  
  toast('已删除');
  await loadData();
}

// Add a food item to an existing meal

  var day = D.records[today];

async function submitAddFood(mealId) {
  var nameEl = document.getElementById('iaf_name');
  var gramsEl = document.getElementById('iaf_grams');
  if (!nameEl || !gramsEl) return;
  
  var name = nameEl.value.trim();
  var grams = parseInt(gramsEl.value) || 100;
  if (!name) { toast('填个食物名吧', 'err'); return; }
  
  var day = D.records[today];
  if (!day || !day.meals) return;
  var meal = day.meals.find(m => m.id === mealId);
  if (!meal) return;
  
  // Calc calories
  var cal = 0;
  var found = null;
  for (var k in CAL_DB) {
    if (name === k || name.indexOf(k) >= 0 || k.indexOf(name) >= 0) { found = CAL_DB[k]; break; }
  }
  if (found) {
    var keys = Object.keys(found).map(Number).sort(function(a,b){return a-b});
    var best = keys[0], bestD = Infinity;
    keys.forEach(function(g) { if (Math.abs(g - grams) < bestD) { bestD = Math.abs(g - grams); best = g; } });
    cal = found[best];
    if (best !== grams && grams > 0) cal = Math.round(cal * grams / best);
  } else {
    cal = Math.round(grams * 1.5);
  }
  
  meal.foods.push({ name: name, grams: grams, calories: cal });
  meal.totalCalories = meal.foods.reduce(function(s, f) { return s + (f.calories || 0); }, 0);
  
  saveData();
  
  toast('🍳 加个菜！', 'ok');
  await loadData();
}

async function saveSettings() {
  var active = document.querySelector('.goal-item.on');
  var gt = active ? active.dataset.t : 'custom';
  var ct = parseInt(document.getElementById('inpTarget').value) || 1800;
  var wt = parseInt(document.getElementById('inpWaterTarget').value) || 2000;
  // Save personal info
  var genderEl = document.querySelector('.gender-opt.on');
  var height = parseInt(document.getElementById('inpHeight').value) || 0;
  var curWeight = parseInt(document.getElementById('inpWeight').value) || 0;
  var targetWeight = parseInt(document.getElementById('inpTargetWeight').value) || 0;
  D.settings.gender = genderEl ? genderEl.dataset.g : 'male';
  if (height) D.settings.height = height;
  if (curWeight) D.settings.currentWeight = curWeight;
  if (targetWeight) D.settings.targetWeight = targetWeight;
  D.settings.goalType = gt;
  D.settings.dailyCalorieTarget = ct;
  D.settings.dailyWaterTarget = wt;
  waterTarget = wt;
  if (!D.settings.targetHistory) D.settings.targetHistory = {};
  // Preserve the original target as default for past dates
  if (!D.settings._defaultTarget) {
    D.settings._defaultTarget = D.settings.dailyCalorieTarget || 1800;
  }
  // Record new target for today
  D.settings.targetHistory[getRealToday()] = ct;
  localStorage.setItem('dietSettings', JSON.stringify(D.settings));
  toast('💾 已保存', 'ok');
  showView('viewToday');
  backFromCalendar = false;
}

function goSettings() {
  backFromCalendar = false;

}

/* ===== Navigation ===== */
function showView(id) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('on'); });
  document.getElementById(id).classList.add('on');

  document.querySelectorAll('#footer button').forEach(function(btn, i) {

      (id === 'viewToday' && i === 0) ||
      (id === 'viewWater' && i === 1) ||
      (id === 'viewSettings' && i === 2)
    );
  });

  else { addBtn.classList.remove('hidden'); }

}

/* ===== Toast ===== */
function toast(msg, cls) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (cls || '');
  requestAnimationFrame(function() { t.classList.add('show'); });
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

/* ===== Utils ===== */
function fmtDate(d) { return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()); }
function pad(n) { return n < 10 ? '0' + n : '' + n; }
// Check for updates
var APP_VER = 'v3.71';
var savedVer = localStorage.getItem('dietAppVer');
if (savedVer && savedVer !== APP_VER) {
  toast('🔄 有新版本，请长按刷新按钮重新加载', 'ok');
}
localStorage.setItem('dietAppVer', APP_VER);

function getRealToday() { return fmtDate(new Date()); }

// Get the calorie target active on a given date
function getTargetForDate(ds) {
  var best = null;
  for (var k in D.settings.targetHistory) {
    if (k <= ds && (!best || k > best)) best = k;
  }
  if (best) return D.settings.targetHistory[best];
  if (D.settings._defaultTarget) return D.settings._defaultTarget;
  return D.settings.dailyCalorieTarget || 1800;
}

function navDate(delta) {
  var parts = today.split('-');
  var d = new Date(+parts[0], +parts[1]-1, +parts[2]);
  d.setDate(d.getDate() + delta);
  var ns = fmtDate(d);
  var now = fmtDate(new Date());
  // Don't allow navigating past today
  if (ns > now) return;
  today = ns;
  renderToday();
}

/* ===== Init ===== */
loadData();
calY = +today.split('-')[0];
calM = +today.split('-')[1];

/* ===== Water Tracking ===== */
var waterTarget = 2000;
var waterDate = fmtDate(new Date()); // currently viewed date in water view

function getWaterData(ds) {
  var day = D.records && D.records[ds];
  return day ? (day.waterRecords || []) : [];
}


function getWaterTotal(ds) {
  return getWaterData(ds).reduce(function(s, r) { return s + (r.ml || 0); }, 0);
}

function fmtDateCN(ds) {
  var parts = ds.split('-');
  var d = new Date(+parts[0], +parts[1]-1, +parts[2]);
  var wd = ['日','一','二','三','四','五','六'];
  return parts[0] + '年' + (+parts[1]) + '月' + (+parts[2]) + '日 周' + wd[d.getDay()];
}

function renderWater() {
  var ds = waterDate || today;
  var total = getWaterTotal(ds);
  var pct = total / waterTarget;
  var over = total >= waterTarget;
  document.getElementById('waterTotal').textContent = total;
  document.getElementById('waterDate').textContent = fmtDateCN(ds);
  document.getElementById('waterTargetDisplay').textContent = waterTarget;
  var fill = document.getElementById('waterProgressFill');
  fill.style.width = (pct * 100) + '%';
  var wp = document.getElementById('waterProgressText');
  if (wp) wp.textContent = Math.round(pct * 100) + '%';
  fill.style.background = over
    ? 'linear-gradient(90deg,#1565C0,#0D47A1)'
    : 'linear-gradient(90deg,#4FC3F7,#1976D2)';
  var fillH2 = Math.min(80 * pct, 80);
  var fillY2 = 90 - fillH2;
  if (fillH2 > 0) { fillH2 += 2; fillY2 -= 2; }
  var wf = document.getElementById('waterFill');
  if (wf) { wf.setAttribute('y', fillY2); wf.setAttribute('height', fillH2); }
  var ws = document.getElementById('waterSurface');
  if (ws) ws.setAttribute('cy', fillY2);
  var msgEl = document.getElementById('waterMsg');
  if (total === 0) msgEl.textContent = '今天还没有记录哦';
  else if (pct <= 0.5) msgEl.textContent = '😿 喝的太少了，多喝点';
  else if (total <= waterTarget) msgEl.textContent = '😋 继续保持，加油';
  else msgEl.textContent = '💪 喝太多啦！注意适量哦';
  var records = getWaterData(ds);
  var listEl = document.getElementById('waterList');
  if (!records.length) {
    listEl.innerHTML = '<div class="water-empty">还没有饮水记录</div>';
  } else {
    listEl.innerHTML = records.map(function(r, i) {
      return '<div class="water-entry"><div class="water-entry-left"><span class="water-entry-amount">' + r.ml + 'ml</span><span style="font-size:12px;color:#bbb">' + (r.time || '') + '</span></div><button class="water-entry-del" onclick="delWater(' + i + ')">×</button></div>';
    }).join('');
  }
}

function waterNavDate(delta) {
  var ds = waterDate || today;
  var parts = ds.split('-');
  var d = new Date(+parts[0], +parts[1]-1, +parts[2]);
  d.setDate(d.getDate() + delta);
  var ns = fmtDate(d);
  if (ns > today) return;
  waterDate = ns;
  renderWater();
}

function addWater(ml) {
  var ds = waterDate || today;
  if (ds !== today) { toast('只能记录今天的饮水哦', 'err'); return; }
  if (!D.records[ds]) D.records[ds] = {meals: [], waterRecords: [], totalCalories: 0};
  if (!D.records[ds].waterRecords) D.records[ds].waterRecords = [];
  var now = new Date();
  D.records[ds].waterRecords.push({ml: ml, time: pad(now.getHours()) + ':' + pad(now.getMinutes())});
  saveData();
  renderWater();
  toast('🥤 补水成功！', 'ok');
}

function addWaterCustom() {
  var inp = document.getElementById('waterCustom');
  var ml = parseInt(inp.value);
  if (!ml || ml <= 0) { toast('请输入有效毫升数', 'err'); return; }
  if (ml > 5000) { toast('一次最多 5000ml 哦', 'err'); return; }
  addWater(ml);
  inp.value = '';
}

function delWater(idx) {
  var ds = waterDate || today;
  if (D.records[ds] && D.records[ds].waterRecords) {
    D.records[ds].waterRecords.splice(idx, 1);
    saveData();
    renderWater();
  }
}

function ringSVG(calPct, waterPct) {
  var uid = 'r' + (calPct + waterPct * 100);
  var C1 = 2 * Math.PI * 16;
  var C2 = 2 * Math.PI * 11;
  var calOff = C1 * (1 - Math.min(calPct, 100) / 100);
  var watOff = C2 * (1 - Math.min(waterPct, 100) / 100);
  var s = '<svg viewbox="0 0 36 36" width="50" height="50">';
  s += '<defs>';
  s += '<linearGradient id="' + uid + 'c" x1="0" y1="0" x2="1" y2="0">';
  s += '<stop offset="0%" stop-color="#E8734A"/>';
  s += '<stop offset="100%" stop-color="#F4A261"/>';
  s += '</linearGradient>';
  s += '<linearGradient id="' + uid + 'w" x1="0" y1="0" x2="1" y2="0">';
  s += '<stop offset="0%" stop-color="#1976D2"/>';
  s += '<stop offset="100%" stop-color="#4FC3F7"/>';
  s += '</linearGradient>';
  s += '<pattern id="' + uid + 'p" patternUnits="userSpaceOnUse" width="12" height="6">';
  s += '<rect width="12" height="6" fill="rgba(255,255,255,0.15)"/>';
  s += '<rect width="10" height="1" x="1" y="1" fill="rgba(255,255,255,0.25)"/>';
  s += '</pattern>';
  s += '</defs>';
  s += '<circle cx="18" cy="18" r="16" fill="none" stroke="#f5f1ec" stroke-width="5"/>';
  s += '<circle cx="18" cy="18" r="16" fill="none" stroke="url(#' + uid + 'c)" stroke-width="5" stroke-dasharray="' + C1 + ' ' + C1 + '" stroke-dashoffset="' + calOff + '" transform="rotate(-90 18 18)"/>';
  s += '<circle cx="18" cy="18" r="16" fill="none" stroke="url(#' + uid + 'p)" stroke-width="5" stroke-dasharray="' + C1 + ' ' + C1 + '" stroke-dashoffset="' + calOff + '" transform="rotate(-90 18 18)"/>';
  s += '<circle cx="18" cy="18" r="11" fill="none" stroke="#f5f1ec" stroke-width="3.5"/>';
  s += '<circle cx="18" cy="18" r="11" fill="none" stroke="url(#' + uid + 'w)" stroke-width="3.5" stroke-dasharray="' + C2 + ' ' + C2 + '" stroke-dashoffset="' + watOff + '" transform="rotate(-90 18 18)"/>';
  s += '<circle cx="18" cy="18" r="11" fill="none" stroke="url(#' + uid + 'p)" stroke-width="3.5" stroke-dasharray="' + C2 + ' ' + C2 + '" stroke-dashoffset="' + watOff + '" transform="rotate(-90 18 18)"/>';
  s += '</svg>';
  return s;
}
